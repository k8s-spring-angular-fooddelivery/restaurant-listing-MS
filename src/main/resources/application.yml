server:
  port: 10001

spring:
  profiles:
    active: dev
  application:
    name: RESTAURANT-SERVICE
  datasource:
    url: jdbc:mysql://localhost:3306/restaurantdb #//mysql-db-instance.c1gsw6g0wm1y.eu-west-2.rds.amazonaws.com
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.MySQLDialect